spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/builder_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Naveen21()}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

app.jwt.secret=${APP_JWT_SECRET:buildtrack-super-secret-key-that-is-at-least-256-bits-long-for-hmac-sha}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

server.port=8080
